name: Update PGA Slates CSV from Google Sheet

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-csv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest CSV from Google Sheet
        run: |
          echo "Downloading Fantasy Points sheet as CSV..."
          curl -L -o pga-slates-data.csv \
            "https://docs.google.com/spreadsheets/d/e/2PACX-1vTYFnwmt5yHygXP28HHRrg47ARQgV0IKm3wnaxoIz8MnGJH_mcIj6HUY96tbl1j7vD2r8JRDgR1wVxD/pub?gid=654148847&single=true&output=csv" \
            -H "Cache-Control: no-cache, no-store, must-revalidate" \
            -H "Pragma: no-cache" \
            || echo "Download failed (curl exit code $?)"

          echo "Downloaded file size:"
          ls -lh pga-slates-data.csv || echo "File not created"
          echo "First 5 lines:"
          head -n 5 pga-slates-data.csv || echo "File appears empty"

      - name: Commit and push if changed
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git remote set-url origin https://x:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          git add pga-slates-data.csv

          # This is the key fix — commit only if something actually changed
          if git commit -m "Auto-update pga-slates-data.csv from Google Sheet (Fantasy Points tab)"; then
            echo "✅ Changes committed, pushing..."
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "ℹ️ No changes to commit (CSV is identical to the version in the repo)"
          fi
